name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Docker image
        run: docker build -t book-tracker-api .

      - name: Run containers
        run: |
          docker-compose up -d
          sleep 10

        env:
          DATABASE_URL: postgresql://postgres:password123@db:5432/booktracker
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password123
          POSTGRES_DB: booktracker

      - name: Test API health
        run: |
          curl --retry 5 --retry-delay 3 --retry-connrefused http://localhost:5000/books

      - name: Tear down
        run: docker-compose down